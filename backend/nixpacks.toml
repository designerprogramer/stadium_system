[phases.setup]
nixPkgs = ["python313"]

[phases.build]
cmds = [
  "cd backend && pip install -r requirements.txt",
  "cd backend && python manage.py migrate",
  "cd backend && python manage.py collectstatic --noinput"
]

[start]
cmd = "cd backend && gunicorn config.wsgi:application --workers 1 --timeout 120"
